<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>樂齡 FIRE 退休財務規劃 | NTD Version</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <style>
        :root {
            --color-primary: #1D9E75;
            --color-bg-sub: #f1f5f9;
            --color-border: #e2e8f0;
            --color-text-main: #1e293b;
            --color-text-sub: #64748b;
        }
        * { box-sizing: border-box; }
        body { 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            background: #f8fafc; color: var(--color-text-main); line-height: 1.6; margin: 0; padding: 20px;
        }
        .app-card { 
            max-width: 900px; margin: 0 auto; background: white; border-radius: 12px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); padding: 25px; 
        }
        .header { border-bottom: 1px solid var(--color-border); margin-bottom: 20px; padding-bottom: 10px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--color-border); }
        .tab { 
            padding: 10px 20px; cursor: pointer; border: none; background: none; 
            color: var(--color-text-sub); font-weight: 500; border-bottom: 2px solid transparent;
        }
        .tab.active { color: var(--color-primary); border-bottom-color: var(--color-primary); }
        .panel { display: none; } .panel.active { display: block; }
        
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .field label { display: block; font-size: 13px; color: var(--color-text-sub); margin-bottom: 6px; }
        .input-box { display: flex; align-items: center; border: 1px solid var(--color-border); border-radius: 8px; padding: 8px 12px; }
        .input-box input { border: none; width: 100%; outline: none; font-size: 15px; }
        .input-box span { color: var(--color-text-sub); margin-right: 5px; }
        
        .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .metric { background: var(--color-bg-sub); padding: 15px; border-radius: 10px; border-left: 4px solid var(--color-primary); }
        .metric-title { font-size: 12px; color: var(--color-text-sub); }
        .metric-val { font-size: 20px; font-weight: 700; color: var(--color-primary); margin-top: 5px; }

        .chart-container { position: relative; height: 300px; width: 100%; margin-bottom: 30px; }
        .alert { padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
        .alert-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .alert-warn { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
        
        input[type=range] { width: 100%; accent-color: var(--color-primary); cursor: pointer; }
        .slider-row { margin-bottom: 15px; }
        .slider-info { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <h2 style="margin:0; color: var(--color-primary);">樂齡 FIRE 退休規劃工具</h2>
        <p style="font-size:12px; color:var(--color-text-sub); margin:5px 0 0;">專為台灣使用者設計 (幣別: NTD)</p>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('inputs', this)">參數設定</div>
        <div class="tab" onclick="switchTab('growth', this)">資產成長預測</div>
        <div class="tab" onclick="switchTab('risk', this)">風險壓力測試</div>
    </div>

    <!-- TAB 1: INPUTS -->
    <div id="tab-inputs" class="panel active">
        <div id="status-banner"></div>
        
        <div class="input-grid">
            <div class="field">
                <label>目前年齡</label>
                <div class="input-box"><input type="number" id="age" value="47" oninput="runCalc()"></div>
            </div>
            <div class="field">
                <label>預計退休年齡</label>
                <div class="input-box"><input type="number" id="retAge" value="55" oninput="runCalc()"></div>
            </div>
            <div class="field">
                <label>目前總投資資產 (NT$)</label>
                <div class="input-box"><span>$</span><input type="number" id="saved" value="30000000" oninput="runCalc()"></div>
            </div>
            <div class="field">
                <label>年生活支出 (當前幣值)</label>
                <div class="input-box"><span>$</span><input type="number" id="expenses" value="1200000" oninput="runCalc()"></div>
            </div>
        </div>

        <div class="slider-row">
            <div class="slider-info"><span>退休前預期報酬率</span><span id="v-rPre">7%</span></div>
            <input type="range" id="rPre" min="1" max="15" step="0.5" value="7" oninput="runCalc()">
        </div>
        <div class="slider-row">
            <div class="slider-info"><span>退休後預期報酬率</span><span id="v-rPost">5%</span></div>
            <input type="range" id="rPost" min="1" max="12" step="0.5" value="5" oninput="runCalc()">
        </div>
        <div class="slider-row">
            <div class="slider-info"><span>預期通貨膨脹率</span><span id="v-inf">2.5%</span></div>
            <input type="range" id="inf" min="0" max="8" step="0.25" value="2.5" oninput="runCalc()">
        </div>

        <div class="metric-grid" id="metrics"></div>
    </div>

    <!-- TAB 2: GROWTH -->
    <div id="tab-growth" class="panel">
        <p style="font-size:13px; color:var(--color-text-sub);">資產變化曲線 (實線為基準，虛線為首年市場衰退 30% 情境)</p>
        <div class="chart-container"><canvas id="chartGrowth"></canvas></div>
        <div id="milestones"></div>
    </div>

    <!-- TAB 3: RISK -->
    <div id="tab-risk" class="panel">
        <h4 style="margin-top:0;">蒙地卡羅生存分析 (500次模擬)</h4>
        <div class="chart-container"><canvas id="chartMonte"></canvas></div>
        <div id="risk-note" class="alert"></div>
    </div>
</div>

<script>
let charts = {};
let state = {};

function switchTab(tabId, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('tab-' + tabId).classList.add('active');
    if(tabId !== 'inputs') updateCharts();
}

function fmt(n) {
    if (n >= 1e8) return 'NT$ ' + (n/1e8).toFixed(2) + ' 億';
    if (n >= 1e4) return 'NT$ ' + (n/1e4).toFixed(0) + ' 萬';
    return 'NT$ ' + Math.round(n).toLocaleString();
}

function runCalc() {
    const age = parseInt(document.getElementById('age').value) || 0;
    const retAge = parseInt(document.getElementById('retAge').value) || 0;
    const saved = parseFloat(document.getElementById('saved').value) || 0;
    const expenses = parseFloat(document.getElementById('expenses').value) || 0;
    const rPre = parseFloat(document.getElementById('rPre').value) / 100;
    const rPost = parseFloat(document.getElementById('rPost').value) / 100;
    const inf = parseFloat(document.getElementById('inf').value) / 100;

    document.getElementById('v-rPre').innerText = (rPre*100).toFixed(1) + '%';
    document.getElementById('v-rPost').innerText = (rPost*100).toFixed(1) + '%';
    document.getElementById('v-inf').innerText = (inf*100).toFixed(1) + '%';

    const swr = 0.035; // 採用原版 3.5% 安全提領率
    const fireTarget = expenses / swr;
    const yearsToRet = Math.max(0, retAge - age);
    const retYears = 95 - retAge;

    // 計算退休時資產
    let portAtRet = saved;
    for(let i=0; i < yearsToRet; i++) portAtRet = portAtRet * (1 + rPre);

    // 基準路徑與首年衰退路徑
    let labels = [], data = [], bearData = [];
    let curr = portAtRet, currBear = portAtRet;
    
    for(let y=0; y <= retYears; y++) {
        labels.push(retAge + y);
        data.push(Math.round(curr));
        bearData.push(Math.round(currBear));

        const adjExp = expenses * Math.pow(1+inf, y);
        // 基準路徑
        curr = Math.max(0, curr * (1 + rPost) - adjExp);
        // 壓力測試路徑：第一年暴跌 30%
        if(y === 0) {
            currBear = currBear * 0.7; 
        } else {
            currBear = Math.max(0, currBear * (1 + rPost) - adjExp);
        }
    }

    // 蒙地卡羅模擬 (500次)
    let mcResults = [];
    for(let y=0; y <= retYears; y++) {
        let success = 0;
        for(let sim=0; sim < 500; sim++) {
            let p = portAtRet, ok = true;
            for(let t=0; t <= y; t++) {
                const r = rPost + (Math.random() - 0.5) * 0.16; // 波動率模擬
                p = p * (1 + r) - (expenses * Math.pow(1+inf, t));
                if(p <= 0) { ok = false; break; }
            }
            if(ok) success++;
        }
        mcResults.push((success/500)*100);
    }

    state = { labels, data, bearData, mcResults, fireTarget, saved, portAtRet, retYears };
    updateUI();
}

function updateUI() {
    const banner = document.getElementById('status-banner');
    if (state.saved >= state.fireTarget) {
        banner.className = "alert alert-success";
        banner.innerText = `恭喜！您已達到 FIRE 目標。目前資產為目標金額的 ${(state.saved/state.fireTarget).toFixed(1)} 倍。`;
    } else {
        banner.className = "alert alert-warn";
        banner.innerText = `距離 FIRE 目標還差 ${fmt(state.fireTarget - state.saved)}。`;
    }

    document.getElementById('metrics').innerHTML = `
        <div class="metric"><div class="metric-title">FIRE 目標資產 (3.5% 提領率)</div><div class="metric-val">${fmt(state.fireTarget)}</div></div>
        <div class="metric"><div class="metric-title">退休時預估資產</div><div class="metric-val">${fmt(state.portAtRet)}</div></div>
        <div class="metric"><div class="metric-title">每年可提領額度 (退休首年)</div><div class="metric-val">${fmt(state.portAtRet * 0.035)}</div></div>
    `;

    const finalSuccess = state.mcResults[state.mcResults.length - 1];
    const riskNote = document.getElementById('risk-note');
    riskNote.innerText = `在 500 次市場波動模擬中，您的資產支撐到 95 歲的成功率為 ${finalSuccess.toFixed(0)}%。`;
    riskNote.className = finalSuccess > 80 ? "alert alert-success" : "alert alert-warn";
}

function updateCharts() {
    if(!state.labels) return;

    // Growth Chart
    if(charts.g) charts.g.destroy();
    charts.g = new Chart(document.getElementById('chartGrowth'), {
        type: 'line',
        data: {
            labels: state.labels,
            datasets: [
                { label: '預估增長', data: state.data, borderColor: '#1D9E75', backgroundColor: 'rgba(29,158,117,0.1)', fill: true, tension: 0.3, pointRadius: 0 },
                { label: '首年市場衰退', data: state.bearData, borderColor: '#e11d48', borderDash: [5,5], fill: false, tension: 0.3, pointRadius: 0 }
            ]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });

    // Monte Carlo Chart
    if(charts.m) charts.m.destroy();
    charts.m = new Chart(document.getElementById('chartMonte'), {
        type: 'bar',
        data: {
            labels: state.labels,
            datasets: [{ label: '成功機率 %', data: state.mcResults, backgroundColor: '#1D9E75' }]
        },
        options: { 
            responsive: true, maintainAspectRatio: false, 
            scales: { y: { min: 0, max: 100 } },
            plugins: { legend: { display: false } } 
        }
    });
}

// Initial Run
runCalc();
</script>
</body>
</html>
