<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>樂齡 FIRE 退休財務規劃 | 無預設值與現金部位版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <style>
        :root {
            --color-primary: #1D9E75;
            --color-bg-sub: #f1f5f9;
            --color-border: #e2e8f0;
            --color-text-main: #1e293b;
            --color-text-sub: #64748b;
        }
        * { box-sizing: border-box; }
        body { 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            background: #f8fafc; color: var(--color-text-main); line-height: 1.6; margin: 0; padding: 20px;
        }
        .app-card { 
            max-width: 900px; margin: 0 auto; background: white; border-radius: 12px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); padding: 25px; 
        }
        .header { border-bottom: 1px solid var(--color-border); margin-bottom: 20px; padding-bottom: 10px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--color-border); }
        .tab { 
            padding: 10px 20px; cursor: pointer; border: none; background: none; 
            color: var(--color-text-sub); font-weight: 500; border-bottom: 2px solid transparent;
        }
        .tab.active { color: var(--color-primary); border-bottom-color: var(--color-primary); }
        .panel { display: none; } .panel.active { display: block; }
        
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .field label { display: block; font-size: 13px; color: var(--color-text-sub); margin-bottom: 6px; }
        .input-box { display: flex; align-items: center; border: 1px solid var(--color-border); border-radius: 8px; padding: 8px 12px; background: #fff; }
        .input-box input { border: none; width: 100%; outline: none; font-size: 15px; background: transparent; }
        .input-box span { color: var(--color-text-sub); margin-right: 5px; }
        
        .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
        .metric { background: var(--color-bg-sub); padding: 15px; border-radius: 10px; border-left: 4px solid var(--color-primary); }
        .metric-title { font-size: 12px; color: var(--color-text-sub); }
        .metric-val { font-size: 20px; font-weight: 700; color: var(--color-primary); margin-top: 5px; }

        .chart-container { position: relative; height: 300px; width: 100%; margin-bottom: 30px; }
        .alert { padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
        .alert-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .alert-warn { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
        .alert-info { background: #eff6ff; color: #1e3a8a; border: 1px solid #bfdbfe; }
        
        input[type=range] { width: 100%; accent-color: var(--color-primary); cursor: pointer; }
        .slider-row { margin-bottom: 15px; }
        .slider-info { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <h2 style="margin:0; color: var(--color-primary);">樂齡 FIRE 退休規劃工具</h2>
        <p style="font-size:12px; color:var(--color-text-sub); margin:5px 0 0;">包含獨立現金儲蓄部位計算 (幣別: NTD)</p>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('inputs', this)">參數設定</div>
        <div class="tab" onclick="switchTab('growth', this)">資產成長預測</div>
        <div class="tab" onclick="switchTab('risk', this)">風險壓力測試</div>
    </div>

    <!-- TAB 1: INPUTS -->
    <div id="tab-inputs" class="panel active">
        <div id="status-banner" class="alert alert-info">請填寫下方所有欄位以產生您的退休預測報告。</div>
        
        <div class="input-grid">
            <div class="field">
                <label>目前年齡</label>
                <div class="input-box"><input type="number" id="age" placeholder="例如: 45" oninput="runCalc()"></div>
            </div>
            <div class="field">
                <label>預計退休年齡</label>
                <div class="input-box"><input type="number" id="retAge" placeholder="例如: 55" oninput="runCalc()"></div>
            </div>
            <div class="field">
                <label>目前總投資資產 (NT$)</label>
                <div class="input-box"><span>$</span><input type="number" id="saved" placeholder="例如: 15000000" oninput="runCalc()"></div>
            </div>
            <div class="field">
                <label>目前未投資存款 (NT$)</label>
                <div class="input-box"><span>$</span><input type="number" id="cash" placeholder="例如: 2000000" title="這筆資金在退休前不會產生投資報酬" oninput="runCalc()"></div>
            </div>
            <div class="field">
                <label>退休前每年持續投入 (NT$)</label>
                <div class="input-box"><span>$</span><input type="number" id="annSavings" placeholder="例如: 1000000" oninput="runCalc()"></div>
            </div>
            <div class="field">
                <label>退休後年生活支出 (當前幣值)</label>
                <div class="input-box"><span>$</span><input type="number" id="expenses" placeholder="例如: 1200000" oninput="runCalc()"></div>
            </div>
        </div>

        <div class="slider-row">
            <div class="slider-info"><span>退休前預期報酬率</span><span id="v-rPre">7%</span></div>
            <input type="range" id="rPre" min="1" max="15" step="0.5" value="7" oninput="runCalc()">
        </div>
        <div class="slider-row">
            <div class="slider-info"><span>退休後預期報酬率</span><span id="v-rPost">5%</span></div>
            <input type="range" id="rPost" min="1" max="12" step="0.5" value="5" oninput="runCalc()">
        </div>
        <div class="slider-row">
            <div class="slider-info"><span>預期通貨膨脹率</span><span id="v-inf">2.5%</span></div>
            <input type="range" id="inf" min="0" max="8" step="0.25" value="2.5" oninput="runCalc()">
        </div>

        <div class="metric-grid" id="metrics">
            <div class="metric"><div class="metric-title">FIRE 目標資產 (3.5% 提領率)</div><div class="metric-val">--</div></div>
            <div class="metric"><div class="metric-title">預估退休時總資產</div><div class="metric-val">--</div></div>
            <div class="metric"><div class="metric-title">退休首年可提領額度</div><div class="metric-val">--</div></div>
        </div>
    </div>

    <!-- TAB 2: GROWTH -->
    <div id="tab-growth" class="panel">
        <p style="font-size:13px; color:var(--color-text-sub);">資產變化曲線 (實線為基準，虛線為首年市場衰退 30% 情境)</p>
        <div class="chart-container"><canvas id="chartGrowth"></canvas></div>
    </div>

    <!-- TAB 3: RISK -->
    <div id="tab-risk" class="panel">
        <h4 style="margin-top:0;">蒙地卡羅生存分析 (500次模擬)</h4>
        <div class="chart-container"><canvas id="chartMonte"></canvas></div>
        <div id="risk-note" class="alert alert-info">等待數據輸入...</div>
    </div>
</div>

<script>
let charts = {};
let state = {};

function switchTab(tabId, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('tab-' + tabId).classList.add('active');
    if(tabId !== 'inputs') updateCharts();
}

function fmt(n) {
    if (isNaN(n) || n == null) return '--';
    if (n >= 1e8) return 'NT$ ' + (n/1e8).toFixed(2) + ' 億';
    if (n >= 1e4) return 'NT$ ' + (n/1e4).toFixed(0) + ' 萬';
    return 'NT$ ' + Math.round(n).toLocaleString();
}

function runCalc() {
    const ageRaw = document.getElementById('age').value;
    const retAgeRaw = document.getElementById('retAge').value;
    const expensesRaw = document.getElementById('expenses').value;

    const rPre = parseFloat(document.getElementById('rPre').value) / 100;
    const rPost = parseFloat(document.getElementById('rPost').value) / 100;
    const inf = parseFloat(document.getElementById('inf').value) / 100;

    document.getElementById('v-rPre').innerText = (rPre*100).toFixed(1) + '%';
    document.getElementById('v-rPost').innerText = (rPost*100).toFixed(1) + '%';
    document.getElementById('v-inf').innerText = (inf*100).toFixed(1) + '%';

    // 檢查必填欄位
    if (!ageRaw || !retAgeRaw || !expensesRaw) {
        document.getElementById('status-banner').className = "alert alert-info";
        document.getElementById('status-banner').innerText = "請填寫您的年齡、退休年齡與預期支出，以開始計算。";
        return; // 等待使用者填寫完畢
    }

    const age = parseInt(ageRaw) || 0;
    const retAge = parseInt(retAgeRaw) || 0;
    const saved = parseFloat(document.getElementById('saved').value) || 0;
    const cash = parseFloat(document.getElementById('cash').value) || 0;
    const annSavings = parseFloat(document.getElementById('annSavings').value) || 0;
    const expenses = parseFloat(expensesRaw) || 0;

    if (age >= retAge || expenses <= 0) return;

    const swr = 0.035; 
    const fireTarget = expenses / swr;
    const yearsToRet = Math.max(0, retAge - age);
    const retYears = 95 - retAge;

    // 計算累積期：投資部位增長
    let investedAtRet = saved;
    for(let i=0; i < yearsToRet; i++) {
        investedAtRet = investedAtRet * (1 + rPre) + annSavings;
    }
    
    // 退休時總資產 = 累積的投資部位 + 未投資的現金存款
    const portAtRet = investedAtRet + cash;

    // 基準路徑與首年衰退路徑
    let labels = [], data = [], bearData = [];
    
    // 累積期：投資部位增長 + 固定的現金部位
    for(let i=0; i < yearsToRet; i++) {
        labels.push(age + i);
        let pastInvested = saved;
        for(let j=0; j<=i; j++) pastInvested = (j===0) ? saved : pastInvested * (1 + rPre) + annSavings;
        const totalNetWorth = pastInvested + cash;
        data.push(Math.round(totalNetWorth));
        bearData.push(Math.round(totalNetWorth));
    }
    
    // 消耗期
    let curr = portAtRet, currBear = portAtRet;
    for(let y=0; y <= retYears; y++) {
        labels.push(retAge + y);
        
        if (y === 0 && yearsToRet > 0) {
             labels.pop(); 
        } else {
            data.push(Math.round(curr));
            bearData.push(Math.round(currBear));
        }

        const adjExp = expenses * Math.pow(1+inf, y);
        curr = Math.max(0, curr * (1 + rPost) - adjExp);
        if(y === 0) {
            currBear = currBear * 0.7; // 退休第一年暴跌 30%
        } else {
            currBear = Math.max(0, currBear * (1 + rPost) - adjExp);
        }
    }

    // 蒙地卡羅模擬
    let mcResults = [];
    for(let y=0; y <= retYears; y++) {
        let success = 0;
        for(let sim=0; sim < 500; sim++) {
            let p = portAtRet, ok = true;
            for(let t=0; t <= y; t++) {
                const r = rPost + (Math.random() - 0.5) * 0.16;
                p = p * (1 + r) - (expenses * Math.pow(1+inf, t));
                if(p <= 0) { ok = false; break; }
            }
            if(ok) success++;
        }
        mcResults.push((success/500)*100);
    }

    state = { labels, data, bearData, mcResults, fireTarget, saved, cash, portAtRet, retYears, yearsToRet };
    updateUI();
}

function updateUI() {
    const banner = document.getElementById('status-banner');
    if (state.portAtRet >= state.fireTarget) {
        banner.className = "alert alert-success";
        banner.innerText = `按照目前的計畫，您預計在退休時可累積 ${fmt(state.portAtRet)} (含現金部位)，已超越 FIRE 目標。`;
    } else {
        banner.className = "alert alert-warn";
        banner.innerText = `按照目前的計畫，預計退休時總資產為 ${fmt(state.portAtRet)}，距離 FIRE 目標還差 ${fmt(state.fireTarget - state.portAtRet)}。`;
    }

    document.getElementById('metrics').innerHTML = `
        <div class="metric"><div class="metric-title">FIRE 目標資產 (3.5% 提領率)</div><div class="metric-val">${fmt(state.fireTarget)}</div></div>
        <div class="metric"><div class="metric-title">預估退休時總資產</div><div class="metric-val">${fmt(state.portAtRet)}</div></div>
        <div class="metric"><div class="metric-title">退休首年可提領額度</div><div class="metric-val">${fmt(state.portAtRet * 0.035)}</div></div>
    `;

    const finalSuccess = state.mcResults[state.mcResults.length - 1];
    const riskNote = document.getElementById('risk-note');
    riskNote.innerText = `在 500 次市場波動模擬中，您的資產從退休支撐到 95 歲的成功率為 ${finalSuccess.toFixed(0)}%。`;
    riskNote.className = finalSuccess > 80 ? "alert alert-success" : "alert alert-warn";
    
    // 如果圖表已經初始化，實時更新
    if (charts.g || charts.m) updateCharts();
}

function updateCharts() {
    if(!state.labels || state.labels.length === 0) return;

    if(charts.g) charts.g.destroy();
    charts.g = new Chart(document.getElementById('chartGrowth'), {
        type: 'line',
        data: {
            labels: state.labels,
            datasets: [
                { label: '預估總資產 (含現金)', data: state.data, borderColor: '#1D9E75', backgroundColor: 'rgba(29,158,117,0.1)', fill: true, tension: 0.3, pointRadius: 0 },
                { label: '退休首年衰退 30%', data: state.bearData, borderColor: '#e11d48', borderDash: [5,5], fill: false, tension: 0.3, pointRadius: 0 }
            ]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
            scales: { x: { title: { display: true, text: '年齡' } } }
        }
    });

    const mcLabels = state.labels.slice(state.yearsToRet); 
    if(charts.m) charts.m.destroy();
    charts.m = new Chart(document.getElementById('chartMonte'), {
        type: 'bar',
        data: {
            labels: mcLabels,
            datasets: [{ label: '成功機率 %', data: state.mcResults, backgroundColor: '#1D9E75' }]
        },
        options: { 
            responsive: true, maintainAspectRatio: false, 
            scales: { x: { title: { display: true, text: '退休後年齡' } }, y: { min: 0, max: 100 } },
            plugins: { legend: { display: false } } 
        }
    });
}
</script>
</body>
</html>
